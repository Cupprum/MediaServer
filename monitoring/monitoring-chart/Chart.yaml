apiVersion: v2
name: monitoring-chart
description: A Helm chart to provision and configure monitoring tools like Prometheus and Grafana
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: prometheus
    version: 27.20.1
    repository: https://prometheus-community.github.io/helm-charts
  - name: grafana
    version: 9.2.7
    repository: https://grafana.github.io/helm-charts