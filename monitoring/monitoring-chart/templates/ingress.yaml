---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
  - kind: Rule
    match: Host(`grafana.pi.local`)
    services:
    - kind: Service
      name: monitoring-app-grafana
      namespace: monitoring
      port: 3000
