storage:
  source: /media/x42/T5/MediaServer/provision/prometheus

prometheus:
  alertmanager:
    enabled: false

  prometheus-pushgateway:
    enabled: false

  server:
    persistentVolume:
      existingClaim: prometheus

    securityContext:
      runAsUser: 1000
      runAsNonRoot: false
      runAsGroup: 1000
      fsGroup: 1000

    service:
      servicePort: 9090

    serverFiles:
      prometheus.yml:
        global:
          scrape_interval: 15s

        scrape_configs:
          - job_name: prometheus
            static_configs:
              - targets: ['localhost:9090']

          - job_name: node
            static_configs:
              - targets: ['localhost:9100']

          - job_name: kubernetes-nodes-cadvisor
            scrape_interval: 10s
            scrape_timeout: 10s
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            kubernetes_sd_configs:
              - role: node

            relabel_configs:
              - action: labelmap
                regex: __meta_kubernetes_node_label_(.+)

              # Only for Kubernetes ^1.7.3.
              # See: https://github.com/prometheus/prometheus/issues/2916
              - target_label: __address__
                replacement: kubernetes.default.svc:443

              - source_labels: [__meta_kubernetes_node_name]
                regex: (.+)
                target_label: __metrics_path__
                replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

            metric_relabel_configs:
              - action: replace
                source_labels: [id]
                regex: '^/machine\.slice/machine-rkt\\x2d([^\\]+)\\.+/([^/]+)\.service$'
                target_label: rkt_container_name
                replacement: '${2}-${1}'

              - action: replace
                source_labels: [id]
                regex: '^/system\.slice/(.+)\.service$'
                target_label: systemd_service_name
                replacement: '${1}'

  configmapReload:
    prometheus:
      enabled: false

grafana:
  service:
    enabled: true
    type: NodePort
    port: 3000

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus-server.monitoring.svc.cluster.local:9090
          access: proxy
          isDefault: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      node-exporter-full:
        gnetId: 1860
        revision: 41
        datasource: Prometheus

      kube-prometheus-cluster:
        gnetId: 315
        revision: 3
        datasource: Prometheus

      kubernetes-cluster-monitoring-via-prometheus:
        gnetId: 19105
        revision: 7
        datasource: Prometheus