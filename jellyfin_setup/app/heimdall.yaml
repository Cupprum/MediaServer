apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall-deployment
  labels:
    app: heimdall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heimdall
  template:
    metadata:
      labels:
        app: heimdall
    spec:
      containers:
        - name: heimdall
          image: linuxserver/heimdall:latest
          env:
            - name: TZ
              value: Europe/Copenhagen
          ports:
            - containerPort: 80 # NOTE: previously i also provided 443
              hostPort: 80
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: heimdall-claim
      volumes:
        - name: heimdall-claim
          persistentVolumeClaim:
            claimName: heimdall-claim
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: heimdall
  name: heimdall
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 80
  selector:
    app: heimdall
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: heimdall-storage
  labels:
    app: heimdall
provisioner: rancher.io/local-path
# volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: heimdall-pv
  labels:
    app: heimdall
spec:
  storageClassName: heimdall-storage
  capacity:
    storage: 100Mi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/Volumes/T5/MediaServer/provision/heimdall/config"
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Delete
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: heimdall
  name: heimdall-claim
spec:
  storageClassName: heimdall-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  volumeName: heimdall-pv
