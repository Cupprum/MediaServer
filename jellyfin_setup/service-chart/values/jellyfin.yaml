serviceName: jellyfin
image: jellyfin/jellyfin:latest
servicePort: 8096
nodePort: 30001
mountPoints:
  - name: config
    source: /provision/jellyfin/config
    destination: /config
  - name: data
    source: /Volumes/T5/MediaServer/media
    destination: /media
  - name: cache
    source: /provision/jellyfin/cache
    destination: /cache