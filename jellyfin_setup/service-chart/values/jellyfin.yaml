serviceName: jellyfin
image: jellyfin/jellyfin:latest
servicePort: 8096
mountPoints:
  - name: config
    source: /media/x42/T5/MediaServer/provision/jellyfin/config
    destination: /config
  - name: data
    source: /media/x42/T5/MediaServer/media
    destination: /media
  - name: cache
    source: /media/x42/T5/MediaServer/provision/jellyfin/cache
    destination: /cache