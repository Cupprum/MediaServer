apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{  .Values.service }}-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cupprum/MediaServer.git
    path: jellyfin_setup/service-chart
    helm:
      valueFiles:
        - values/{{ .Values.service }}.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
