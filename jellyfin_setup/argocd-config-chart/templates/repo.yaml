apiVersion: v1
kind: Secret
metadata:
  name: media-server-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  name: {{ .Values.git.name | quote }}
  project: "default"
  url: {{ .Values.git.url | quote }}
  username: {{ .Values.git.username | quote }}
  password: {{ .Values.git.token | quote }}