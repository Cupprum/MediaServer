services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    networks:
      - mediaserver_net
    ports:
      - "8096:8096"
    volumes:
      - "/home/x42/PP/MediaServer/data/media/movies:/media/movies"
      - "/home/x42/PP/MediaServer/data/media/tv:/media/tv"

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    networks:
      - mediaserver_net
    ports:
      - "9696:9696"

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - mediaserver_net
    ports:
      - "8080:8080"
    volumes:
      - "/home/x42/PP/MediaServer/data/media:/downloads:z"
    environment:
      - MEDIASERVER_QBITTORRENT_RAW_PASSWORD=${MEDIASERVER_QBITTORRENT_RAW_PASSWORD}
    entrypoint: ["/bin/bash", "-c"]
    command: 
      - |
        set -euo pipefail
        mkdir -p /config/qBittorrent
        CONFIG_FILE="/config/qBittorrent/qBittorrent.conf"
        echo "[Preferences]" >> "$$CONFIG_FILE"
        # Use DOUBLE '$$' here so it passes literally into the shell script inside the container
        echo "WebUI\Password_PBKDF2=$${MEDIASERVER_QBITTORRENT_RAW_PASSWORD//\'}" >> "$$CONFIG_FILE"
        exec /init
    
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    networks:
      - mediaserver_net
    ports:
      - "8191:8191"

networks:
  mediaserver_net:
    driver: bridge