serviceName: qbittorrent
image: lscr.io/linuxserver/qbittorrent:latest
port: 8080
mountPoints:
  - name: config
    source: /media/x42/T5/MediaServer/provision/qbittorrent/config
    destination: /config
  - name: data
    source: /media/x42/T5/MediaServer/media/movies
    destination: /data/torrents