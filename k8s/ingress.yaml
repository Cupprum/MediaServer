---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: Host(`argocd.pi.local`)
    priority: 10
    services:
    - kind: Service
      name: argocd-server
      namespace: argocd
      port: 80
  - kind: Rule
    match: Host(`argocd.pi.local`) && Headers(`Content-Type`, `application/grpc`)
    priority: 11
    services:
    - kind: Service
      name: argocd-server
      namespace: argocd
      port: 80
      scheme: h2c
  tls:
    certResolver: default
    options: {}