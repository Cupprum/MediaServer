apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-server-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.frontend.rule.type: "PathPrefixStrip"
spec:
  rules:
  - http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: monitoring-app-grafana
            port:
              number: 80