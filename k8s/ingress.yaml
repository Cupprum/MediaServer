apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-server-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            servicePort: 80