storage:
  source: /home/x42/MediaServer/config/prometheus

prometheus:
  alertmanager:
    enabled: false

  prometheus-pushgateway:
    enabled: false

  server:
    service:
      servicePort: 9090

    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    serverFiles:
      prometheus.yml:
        global:
          scrape_interval: 15s

        scrape_configs:
          - job_name: prometheus
            static_configs:
              - targets: ['localhost:9090']

          - job_name: node
            static_configs:
              - targets: ['localhost:9100']

    extraHostPathMounts:
      - name: data
        mountPath: /data
        subPath: ""
        hostPath: /home/x42/MediaServer/config/prometheus

  prometheus-node-exporter:
    securityContext:
      fsGroup: 1000
      runAsGroup: 1000
      runAsUser: 1000

    extraHostVolumeMounts:
     - name: media
       hostPath: /media/x42
       mountPath: /media/x42
       readOnly: true

  configmapReload:
    prometheus:
      enabled: false

grafana:
  admin:
    existingSecret: "grafana-admin-credentials"

  service:
    enabled: true

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: "http://monitoring-app-prometheus-server.monitoring.svc.cluster.local:9090"
          access: proxy
          isDefault: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      node-exporter-full:
        gnetId: 1860
        revision: 41
        datasource: Prometheus

      kubernetes-cluster-monitoring-via-prometheus:
        gnetId: 19105
        revision: 7
        datasource: Prometheus